spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/collabdoc
    username: collabdoc
    password: collabdoc
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

collabdoc:
  yrs-bridge:
    library-path: ${YRS_BRIDGE_LIB_PATH:../yrs-bridge/target/release/libyrs_bridge.dylib}
  jwt:
    secret: change-me-to-a-random-64-char-string-in-production-please-now
    expiration-days: 7
  instance-id: ${INSTANCE_ID:${random.uuid}}
  snapshot:
    interval-minutes: ${SNAPSHOT_INTERVAL:5}
