name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  fast:
    name: Fast checks
    uses: ./.github/workflows/ci-fast.yml

  e2e:
    name: E2E tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    needs: fast

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: collabdoc
          POSTGRES_USER: collabdoc
          POSTGRES_PASSWORD: collabdoc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collabdoc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: '25'

      - uses: actions/download-artifact@v4
        with:
          name: yrs-bridge-so
          path: yrs-bridge/target/release/

      - name: Make .so executable
        run: chmod +x yrs-bridge/target/release/libyrs_bridge.so

      - name: Build backend
        run: ./gradlew bootJar
        working-directory: backend/

      - name: Start backend
        run: java --enable-preview --enable-native-access=ALL-UNNAMED -jar build/libs/*.jar &
        working-directory: backend/
        env:
          YRS_BRIDGE_LIB_PATH: ${{ github.workspace }}/yrs-bridge/target/release/libyrs_bridge.so

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || true)
            if [ "$STATUS" != "000" ]; then
              echo "Backend is up (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/

      - name: Start frontend
        run: npx vite --host &
        working-directory: frontend/

      - name: Wait for frontend
        run: |
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$STATUS" != "000" ]; then
              echo "Frontend is up (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for frontend... ($i/15)"
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend/

      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend/

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
