services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: collabdoc
      POSTGRES_USER: collabdoc
      POSTGRES_PASSWORD: collabdoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
